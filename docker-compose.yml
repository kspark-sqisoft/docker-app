# 운영(프로덕션 스타일): 멀티스테이지 빌드 이미지 + nginx 정적 서빙 (핫리로드 없음)
# 개발(핫리로드): docker-compose.dev.yml 사용
services:
  db:
    image: postgres:16-alpine
    container_name: study-board-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-board}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-board}
      POSTGRES_DB: ${DB_NAME:-board}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: study-board-api
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-board}
      DB_PASSWORD: ${DB_PASSWORD:-board}
      DB_NAME: ${DB_NAME:-board}
      PORT: 3000
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-study_board_jwt_access_dev_key_32chars_min!!}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_DAYS: ${JWT_REFRESH_EXPIRES_DAYS:-7}
      REFRESH_COOKIE_SECURE: ${REFRESH_COOKIE_SECURE:-false}
      UPLOADS_DIR: /app/uploads
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget -qO- http://127.0.0.1:3000/api/health >/dev/null || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  frontend:
    build: ./frontend
    container_name: study-board-web
    restart: unless-stopped
    ports:
      - '8080:80'
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  backend_uploads:
